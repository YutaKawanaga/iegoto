# リマインダー配信の起動係 (F-08)。Vercel 無料枠の Cron が日次限定のため
# GitHub Actions のスケジュール実行 (5分間隔) で本番の job エンドポイントを叩く。
# 実際の遅延は GitHub 側の混雑で数分ズレることがある (リマインダー用途では許容)
#
# 必要なシークレット:
#   CRON_SECRET: Vercel の環境変数 CRON_SECRET と同じ値
name: dispatch-reminders

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 配信ジョブを起動
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::シークレット CRON_SECRET が未設定です"
            exit 1
          fi
          code=$(curl -s -o /tmp/res.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://iegoto-drab.vercel.app/jobs/dispatch-reminders)
          cat /tmp/res.json
          if [ "$code" != "200" ]; then
            echo "::error::配信ジョブが $code で失敗しました"
            exit 1
          fi
