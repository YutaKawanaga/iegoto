# 本番デプロイの起動係。
# Vercel の Git 連携による自動デプロイは「コミット作者がプロジェクトの協力者ではない」
# 判定 (Hobby プランの制約) でブロックされるため、Deploy Hook 経由でビルドを起動する。
# Hook 経由のビルドは main の最新を取得してビルドするため、作者チェックの影響を受けない。
#
# 必要なシークレット:
#   VERCEL_DEPLOY_HOOK: Vercel プロジェクトの Settings > Git > Deploy Hooks で作成した URL
name: deploy-production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Deploy Hook を起動
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "::error::シークレット VERCEL_DEPLOY_HOOK が未設定です。Vercel の Deploy Hook URL を登録してください"
            exit 1
          fi
          code=$(curl -s -o /tmp/res.json -w "%{http_code}" -X POST "$VERCEL_DEPLOY_HOOK")
          cat /tmp/res.json
          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "::error::Deploy Hook が $code で失敗しました"
            exit 1
          fi
