<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- iegoto アプリアイコン: 家族カレンダー (カレンダー + ハート) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <!-- カレンダーの吊りリング -->
  <rect x="162" y="84" width="28" height="84" rx="14" fill="#ffffff"/>
  <rect x="322" y="84" width="28" height="84" rx="14" fill="#ffffff"/>
  <!-- カレンダー本体 -->
  <rect x="88" y="132" width="336" height="296" rx="44" fill="#ffffff"/>
  <!-- ハート (家族) -->
  <path fill="url(#heart)" d="M256 380
    C 234 362, 156 312, 156 256
    C 156 220, 184 196, 216 196
    C 234 196, 249 206, 256 220
    C 263 206, 278 196, 296 196
    C 328 196, 356 220, 356 256
    C 356 312, 278 362, 256 380 Z"/>
</svg>
